name: First Interaction

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Welcome to Learning Hub! Thanks for opening your first issue. We'll take a look as soon as possible!"
          pr-message: "Congratulations on your first Pull Request! Thanks for contributing to Learning Hub. We'll review your changes shortly!"
