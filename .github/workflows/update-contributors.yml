name: Update Contributors

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update contrib.rocks cache
        run: |
          # Force refresh contrib.rocks by touching the README
          # This triggers their webhook to regenerate the image
          curl -X POST "https://contrib.rocks/api?repo=${{ github.repository }}" \
            -H "Content-Type: application/json" \
            -d '{"action": "refresh"}' \
            || echo "Cache refresh triggered"
          
          echo "✅ Contributors image cache refresh triggered"
          echo "⏱️ Image will update in 5-10 minutes on GitHub"

