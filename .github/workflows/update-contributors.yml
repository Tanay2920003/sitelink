name: Update Contributors

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-contributors:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Render contributors section
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const readmePath = 'README.md';
            const startMarker = '<!-- CONTRIBUTORS:START -->';
            const endMarker = '<!-- CONTRIBUTORS:END -->';

            const contributors = await github.paginate(
              github.rest.repos.listContributors,
              {
                owner,
                repo,
                per_page: 100,
              }
            );

            const humans = contributors.filter((contributor) => contributor.type !== 'Bot');

            const contributorMarkup = humans.length
              ? [
                  '<p align="center">',
                  ...humans.map(
                    (contributor) =>
                      `  <a href="${contributor.html_url}" title="@${contributor.login}"><img src="${contributor.avatar_url}&s=72" width="72" height="72" alt="@${contributor.login}" /></a>`
                  ),
                  '</p>',
                ].join('\n')
              : '_No contributors found yet._';

            const replacement = [
              startMarker,
              'Thank you to everyone helping improve Learning Hub. Want to be listed here too? Open a GitHub contribution and become part of the project.',
              '',
              '> **Note**: This section is refreshed automatically by GitHub Actions after merges to `main`.',
              '',
              contributorMarkup,
              endMarker,
            ].join('\n');

            const readme = fs.readFileSync(readmePath, 'utf8');
            const pattern = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`, 'm');

            if (!pattern.test(readme)) {
              core.setFailed('Contributors markers were not found in README.md.');
              return;
            }

            const updated = readme.replace(pattern, replacement);
            fs.writeFileSync(readmePath, updated);

      - name: Create contributors update pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: docs: update contributors
          title: "docs: update contributors"
          body: |
            This automated PR refreshes the contributors section in `README.md`.
          branch: chore/update-contributors
          delete-branch: true
          labels: automerge,contributors,bot
